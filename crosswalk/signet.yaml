    notes: "Signet attestation example merged into AGT examples"

  - context: "IETF draft-farley-acta-signed-receipts"
    url: "https://github.com/VeritasActa/agt-integration-profile/pull/1"
    notes: "Conformance self-certification in progress. Same crypto primitives (JCS + Ed25519 + SHA-256); wire format adapter documented."

  - context: "LangChain ComplianceBackend Protocol RFC"
    url: "https://github.com/langchain-ai/langchain/issues/35691"
    notes: "Named contributor implementation. ComplianceBackend adapter shipped in signet-auth 0.9.1."

  - context: "NIST NCCoE AI Agent Identity & Authorization"
    url: "https://www.nccoe.nist.gov/projects/software-and-ai-agent-identity-and-authorization"
    notes: "Signet covers 3 of 4 NCCoE pillars: authorization (delegation), delegation (scoped chains), logging/non-repudiation (signed receipts)."
