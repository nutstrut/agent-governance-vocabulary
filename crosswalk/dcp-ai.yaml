# crosswalk/dcp-ai.yaml
#
# Maps the Digital Citizenship Protocol for AI Agents (DCP-AI) public
# specification and reference SDKs to the canonical vocabulary defined
# in vocabulary.yaml v0.1.
#
# DCP-AI is a layered governance protocol for autonomous AI agents,
# organized in three progressive layers — Trust, Citizenship, and
# Representation. It provides cryptographically verifiable identity,
# machine-readable intent declarations, tamper-evident audit trails,
# authenticated agent-to-agent communication, lifecycle governance,
# procedural accountability, and delegated representation as a unified
# protocol stack.
#
# The specification is published open-access with a permanent DOI. The
# reference SDKs (TypeScript, Python, Go, Rust, WebAssembly) are
# Apache-2.0 and publish v2.8.x to their native registries (npm
# tracks the TypeScript-side codebase separately at v2.1.1). Four
# operational services (verification, anchor, transparency-log,
# revocation) are published as multi-arch Docker images on GHCR,
# self-hostable via Fly.io configs or Kubernetes.
#
# Notable architectural properties:
#   1. Composite post-quantum signatures from day one — Ed25519 paired
#      with ML-DSA-65 (NIST FIPS 204). Cryptographic conformance
#      includes RFC 8032 Ed25519 deterministic KAT vectors and FIPS
#      204 ML-DSA-65 property-based tests running in each of the four
#      SDKs (TypeScript, Python, Go, Rust). Cross-SDK interop vectors
#      validate byte-identical signed envelopes across SDKs.
#   2. Dual-hash Merkle roots (SHA-256 + SHA3-256) for audit chain
#      integrity, reducing collision risk over long retention horizons.
#   3. Blinded Responsible Principal Record (RPR) with PII hashing, so
#      the human-binding property can be verified without disclosing
#      the principal's identifying data.
#   4. `dcp-jcs-v1` canonicalization profile, declared as a self-
#      contained normative document (`spec/CANONICALIZATION_PROFILE.md`,
#      9 rules + edge-case acceptance table + cross-language undefined
#      mapping). All four SDKs produce byte-identical canonical output
#      for the profile, validated by 14 shared edge-case interop
#      vectors. The bundle manifest carries an explicit
#      `canonicalization_profile: "dcp-jcs-v1"` field for forward-
#      compatible versioning. Unicode normalization is OUT OF SCOPE
#      in v1 with documented rationale.
#
# Implementation status: DCP-01 through DCP-09 are shipped as
# operational functions across all four SDKs (TypeScript, Python, Go,
# Rust) at v2.8.x in the main branch. Public registry versions at the
# time of crosswalk authoring: PyPI dcp-ai 2.8.1, crates.io dcp-ai
# 2.8.1, Go modules sdks/go/v2 2.8.1; the npm @dcp-ai/sdk package is
# at 2.1.1 (TypeScript-side bumps track separately from the protocol
# version because v2.8.x added no TypeScript code changes beyond the
# field wiring already shipped in 2.1.1). Naming is idiomatic per
# language: camelCase in TypeScript, snake_case in Python and Rust,
# PascalCase in Go. Cross-SDK interop vectors at
# `tests/interop/v2/interop_vectors.json` are consumed by all four
# SDKs and validate byte-identical signed envelopes on CI.
#
# Paper (CC-BY 4.0):     https://doi.org/10.5281/zenodo.19040913
# Software (Apache-2.0): https://doi.org/10.5281/zenodo.19656026
# Spec home:             https://dcp-ai.org
# Docs:                  https://docs.dcp-ai.org
# Repo:                  https://github.com/dcp-ai-protocol/dcp-ai
# Docker images:         ghcr.io/dcp-ai-protocol/dcp-ai/{verification,anchor,transparency-log,revocation}
# JSON-LD @context:      https://dcp-ai.org/credentials/v2

system:
  name: Digital Citizenship Protocol for AI Agents
  short_name: DCP-AI
  home: https://dcp-ai.org
  github: https://github.com/dcp-ai-protocol/dcp-ai
  spec_version: "v2.8.x in main; PyPI 2.8.1, crates.io 2.8.1, Go modules 2.8.1, npm 2.1.1 (TypeScript)"
  role: >
    Layered governance protocol for autonomous AI agents. Defines
    cryptographically verifiable identity (DCP-01), machine-readable
    intent declaration with policy gating (DCP-02), Merkle-anchored
    audit chains (DCP-03), authenticated agent-to-agent communication
    (DCP-04), lifecycle governance (DCP-05 through DCP-08), and
    delegated representation (DCP-09). All four reference SDKs
    (TypeScript, Python, Go, Rust) ship the operational surface for
    DCP-01 through DCP-09 with idiomatic naming per language and
    byte-identical output validated by cross-SDK interop vectors on CI.
  license_spec: CC-BY 4.0
  license_software: Apache-2.0

license: Apache-2.0
maintainer:
  github: lktron00
  author: Danilo Naranjo Emparanza
  orcid: 0009-0003-7520-8527
  contact: dan@ocularsolution.com

# ─────────────────────────────────────────────────
# SIGNAL TYPE MAPPINGS
# How DCP-AI represents each canonical signal_type from vocabulary.yaml.
# ─────────────────────────────────────────────────
signal_types:

  governance_attestation:
    canonical: governance_attestation
    match: exact
    notes: |
      DCP-AI produces governance_attestation natively through the
      combination of DCP-01 Citizenship Bundle, DCP-02 Intent and
      Policy Decision artifacts, and DCP-03 audit chain entries. A
      signed bundle binds an agent identity, a declared intent, a
      policy decision, and an audit chain anchor, all under one
      composite signature. The bundle itself is the attestation that
      the action satisfied declared governance requirements.

      Notable property: signatures are composite post-quantum
      (Ed25519 + ML-DSA-65, NIST FIPS 204). The same envelope
      verifies against both classical and post-quantum primitives,
      making the attestation forward-safe for audit retention
      horizons that exceed conservative CRQC timelines. This is
      relevant for EU AI Act Article 12 high-risk system logs, which
      must remain verifiable throughout the operational lifetime of
      the AI system (typically ten years or more).

      Note for vocabulary.yaml maintainers: please add DCP-AI to
      issuers_in_production for governance_attestation. Current list
      (AgentNexus, Nobulex, SINT, APS) would become
      (AgentNexus, Nobulex, SINT, APS, DCP-AI).
    dcp_term: SignedBundleV2
    dcp_symbols:
      typescript: [BundleBuilderV2, signBundleV2, verifySignedBundleV2, intentHash]
      python: [BundleBuilder, sign_bundle, verify_signed_bundle, intent_hash]
      go: [BuildBundleV2, SignBundleV2, VerifySignedBundleV2]
      rust: [verify_signed_bundle]
    issuer_uri: https://dcp-ai.org
    algorithm: Ed25519 + ML-DSA-65 (composite)
    signed_shape: |
      Signed bundle containing the agent identity record, declared
      intent, policy decision artifact, and audit chain reference,
      all canonicalized with JCS (RFC 8785) and sealed with a
      composite Ed25519 + ML-DSA-65 signature.
    descriptor_dimensions:
      enforcement_class: binding
      validity_temporal: at_issuance
      refusal_authority: structurally_impossible_to_violate
      invariant_survival: post_action
      replay_class: full_replay
      governed_action_class: publish

  trust_verification:
    canonical: trust_verification
    match: exact
    notes: |
      Co-listed with AgentID and APS in vocabulary.yaml. DCP-AI ships
      the Citizenship Bundle (DCP-01) as the identity-layer primitive.
      A Signed Bundle V2 binds the agent keypair (composite Ed25519 +
      ML-DSA-65) to a human principal through the Responsible
      Principal Record (RPR), with PII hashing so the binding can be
      verified without disclosing the principal's identifying data.

      The human binding is verified as part of the bundle verification
      flow (`verifySignedBundleV2` / `verify_signed_bundle`), not as
      a separate standalone call. Blinded RPR with PII hash is
      currently available in the Python SDK (`blind_rpr`,
      `verify_blinded_rpr`, `compute_pii_hash`); parity for the other
      SDKs is planned.

      Four security tiers (LOCAL, NETWORK, FEDERATED, GLOBAL) modulate
      verification depth and the expected evidence set at each trust
      boundary crossing.
    dcp_term: CitizenshipBundle (DCP-01)
    dcp_symbols:
      typescript: [BundleBuilderV2, signBundleV2, verifySignedBundleV2, presentFull, presentCompact, presentReference, presentIncremental, suggestPresentationMode, computeBundleHash]
      python: [BundleBuilder, sign_bundle, verify_signed_bundle, blind_rpr, verify_blinded_rpr, is_blinded_rpr, compute_pii_hash]
      go: [BuildBundleV2, SignBundleV2, VerifySignedBundleV2]
      rust: [verify_signed_bundle]
    issuer_uri: https://dcp-ai.org
    algorithm: Ed25519 + ML-DSA-65 (composite)

  entity_continuity:
    canonical: entity_continuity
    match: partial
    notes: |
      DCP-AI addresses identity persistence through DCP-05 (Lifecycle)
      and DCP-06 (Succession). All four SDKs (TypeScript, Python, Go,
      Rust) ship the operational functions: commissioning and
      decommissioning certificates, vitality reports with score
      computation, state transition validation, digital testaments,
      succession execution, and memory classification with transfer
      manifests.

      The match is partial because DCP-AI's treatment is broader than
      entity_continuity as currently defined. SBR Protocol's
      entity_continuity (key rotation with migration type
      classification) maps to a subset of DCP-05 events.

      If vocabulary maintainers narrow entity_continuity to
      same-identity persistence only and introduce a separate term
      for operational-state succession with memory inheritance,
      DCP-AI can be re-mapped accordingly.
    dcp_term: Commissioning + Decommissioning + Vitality + Succession (DCP-05 + DCP-06)
    dcp_symbols:
      typescript: [createCommissioningCertificate, createDecommissioningRecord, createVitalityReport, hashVitalityReport, computeVitalityScore, validateStateTransition, createDigitalTestament, updateDigitalTestament, executeSuccession, classifyMemory, createMemoryTransferManifest]
      python: [create_commissioning_certificate, create_decommissioning_record, create_vitality_report, hash_vitality_report, compute_vitality_score, validate_state_transition, create_digital_testament, update_digital_testament, execute_succession, classify_memory, create_memory_transfer_manifest]
      go: [CreateCommissioningCertificate, CreateDecommissioningRecord, CreateVitalityReport, HashVitalityReport, ComputeVitalityScore, ValidateStateTransition, CreateDigitalTestament, UpdateDigitalTestament, ExecuteSuccession, ClassifyMemory, CreateMemoryTransferManifest]
      rust: [create_commissioning_certificate, create_decommissioning_record, create_vitality_report, hash_vitality_report, compute_vitality_score, validate_state_transition, create_digital_testament, update_digital_testament, execute_succession, classify_memory, create_memory_transfer_manifest]

  peer_review:
    canonical: peer_review
    match: partial
    notes: |
      DCP-AI's DCP-07 (Conflict Resolution) provides a dispute
      framework with creation, escalation, arbitration panels,
      resolution records, objection records, and precedent lookup.
      All four SDKs (TypeScript, Python, Go, Rust) ship the
      operational functions with idiomatic naming per language.

      The match is partial because peer_review in vocabulary.yaml is
      a task-completion attestation (Logpose) or reviewer-credibility
      assessment (RNWY), while DCP-07 is specifically conflict
      adjudication with precedent retention via jurisprudence
      bundles. They share signed-envelope shape but differ in
      reference point. If a future vocabulary revision splits
      peer_review into narrower terms (e.g. conflict_adjudication,
      task_completion, reviewer_credibility), DCP-AI's mapping moves
      to conflict_adjudication exact.
    dcp_term: Dispute + ArbitrationResolution + JurisprudenceBundle (DCP-07)
    dcp_symbols:
      typescript: [createDispute, escalateDispute, resolveDispute, createArbitrationPanel, submitResolution, lookupPrecedent, createObjection, buildJurisprudenceBundle]
      python: [create_dispute, escalate_dispute, resolve_dispute, create_arbitration_panel, submit_resolution, lookup_precedent, create_objection, build_jurisprudence_bundle]
      go: [CreateDispute, EscalateDispute, ResolveDispute, CreateArbitrationPanel, SubmitResolution, LookupPrecedent, CreateObjection, BuildJurisprudenceBundle]
      rust: [create_dispute, escalate_dispute, resolve_dispute, create_arbitration_panel, submit_resolution, lookup_precedent, create_objection, build_jurisprudence_bundle]

  passport_grade:
    canonical: passport_grade
    match: non_equivalent_similar_label
    notes: |
      DCP-AI does not emit composite trust grades. The four security
      tiers (LOCAL, NETWORK, FEDERATED, GLOBAL) look superficially
      similar to APS's 0-3 passport grades but are governance scope
      boundaries, not trust scores. LOCAL governs within a single
      trust domain; GLOBAL governs planetary multi-agent ecosystems.
      A Citizenship Bundle is not "upgraded" from LOCAL to GLOBAL by
      accumulating evidence — the tier is declared by the deployment
      context at issuance time.

      Flagged as non_equivalent_similar_label to prevent consumers
      from treating the DCP-AI tier as a trust grade. Consumers that
      want a composite score should compose it from DCP-AI
      governance_attestation evidence on their own policy layer, or
      consume APS's passport_grade directly.

  wallet_state:
    canonical: wallet_state
    match: no_mapping
    notes: "Not in DCP-AI scope. InsumerAPI is the production issuer."

  behavioral_trust:
    canonical: behavioral_trust
    match: no_mapping
    notes: |
      Not in DCP-AI scope. DCP-AI's DCP-03 produces tamper-evident
      behavioral history as raw audit records, but does not emit a
      scored behavioral trust assessment. Consumers that want
      behavioral_trust derived from DCP-AI audit trails should
      compose the score at their own policy layer. RNWY and MolTrust
      are the production issuers for scored assessments.

  wallet_intelligence:
    canonical: wallet_intelligence
    match: no_mapping
    notes: "Not in DCP-AI scope. RNWY issues."

  reasoning_integrity:
    canonical: reasoning_integrity
    match: no_mapping
    notes: |
      Not in DCP-AI scope. ThoughtProof is the production issuer.
      DCP-AI attests identity, intent, policy compliance, and audit
      continuity around an action; it does not attest the integrity
      of the agent's internal reasoning process that produced the
      intent.

  compliance_risk:
    canonical: compliance_risk
    match: no_mapping
    notes: |
      Not in DCP-AI scope. Revettr issues compliance_risk
      attestations. DCP-AI can consume compliance_risk receipts as
      governance inputs to policy decisions, but does not produce
      them.

  security_posture:
    canonical: security_posture
    match: no_mapping
    notes: "Not in DCP-AI scope. AgentGraph issues."

  job_performance:
    canonical: job_performance
    match: no_mapping
    notes: "Not in DCP-AI scope. Maiat issues."

  settlement_witness:
    canonical: settlement_witness
    match: no_mapping
    notes: |
      Not in DCP-AI scope. SAR issues settlement_witness receipts.
      DCP-AI audit chain entries capture execution-phase evidence,
      but at a different layer than SAR's wallet-bound settlement
      receipts.

# ─────────────────────────────────────────────────
# DECISION TRAJECTORY MAPPINGS
# Longitudinal primitives from vocabulary.yaml#decision_trajectory.
# ─────────────────────────────────────────────────
decision_trajectory:

  decision_lineage:
    canonical: decision_lineage
    match: structural
    notes: |
      DCP-AI's DCP-03 Audit Chain provides ordered, content-addressable
      entries where each entry references its predecessor by hash.
      Merkle roots are computed with a dual-hash construction
      (SHA-256 + SHA3-256) via `dualMerkleRoot` / `dual_merkle_root`
      in all four SDKs, with single-hash Merkle root helpers as well.
      All four SDKs also ship `auditEventsMerkleRoot` for building
      roots directly from audit event streams and the
      `PQCheckpointManager` + checkpoint creator for periodic
      post-quantum checkpointing of chain state.

      Canonicalization follows the `dcp-jcs-v1` profile (declared in
      `spec/CANONICALIZATION_PROFILE.md`, 9 normative rules + edge-case
      acceptance table + cross-language `undefined` mapping). The
      profile is a strict subset of RFC 8785 JCS that pins the cases
      JCS leaves implementation-defined. Bundle manifests carry an
      explicit `canonicalization_profile: "dcp-jcs-v1"` field for
      forward-compatible versioning. 14 shared edge-case interop
      vectors (`tests/interop/v2/interop_vectors.json#canonicalization.edge_cases`)
      validate byte-identical canonical output across the four SDKs;
      hash digests use SHA-256 with optional SHA3-256 via the
      dual-hash path.
    dcp_term: AuditChain + MerkleRoot + PQCheckpoint + dcp-jcs-v1 (DCP-03)
    dcp_symbols:
      typescript: [prevHashForEntry, merkleRootFromHexLeaves, merkleRootForAuditEntries, dualMerkleRoot, auditEventsMerkleRoot, hashObject, createPQCheckpoint, PQCheckpointManager, canonicalizeV2]
      python: [prev_hash_for_entry, merkle_root_from_hex_leaves, merkle_root_for_audit_entries, dual_merkle_root, audit_events_merkle_root, hash_object, create_pq_checkpoint, PQCheckpointManager, canonicalize_v2]
      go: [MerkleRootFromHexLeaves, DualMerkleRoot, AuditEventsMerkleRoot, HashObject, CreatePQCheckpoint, PQCheckpointManager, CanonicalizeV2]
      rust: [merkle_root_from_hex_leaves, merkle_root_for_audit_entries, dual_merkle_root, audit_events_merkle_root, hash_object, create_pq_checkpoint, PQCheckpointManager, canonicalize_v2]

  baseline_revision:
    canonical: baseline_revision
    match: no_mapping
    notes: |
      DCP-AI does not currently carry a baseline_revision field on
      audit entries. If cross-system demand surfaces for an explicit
      baseline_revision field, it could be added as an optional
      envelope attribute without breaking the existing chain semantics.

  divergence_signal:
    canonical: divergence_signal
    match: no_mapping
    notes: |
      Not in DCP-AI scope. DCP-AI does not emit quantitative
      behavioral drift measurements. APS and PDR are production
      issuers for this primitive.

  trust_velocity:
    canonical: trust_velocity
    match: no_mapping
    notes: "Not in DCP-AI scope. APS and PDR are production issuers."

# ─────────────────────────────────────────────────
# CONSTRAINT DECLARATIONS
# ─────────────────────────────────────────────────
constraints:

  observation_window:
    canonical: observation_window
    match: no_mapping
    notes: |
      DCP-AI does not emit windowed signals; audit entries are
      per-action rather than per-window. If a future DCP-AI revision
      adds windowed telemetry (e.g. for revocation registry
      freshness), observation_window would apply there.

# ─────────────────────────────────────────────────
# DCP-AI-SPECIFIC PRIMITIVES NOT YET IN VOCABULARY
# Governance primitives DCP-AI ships that are not canonical signal_types
# (because signal_types describe attestation shapes, and these describe
# protocol mechanics or deployment boundaries). Listed here for
# completeness and as candidates for future vocabulary expansion if
# cross-system adoption surfaces.
# ─────────────────────────────────────────────────
out_of_vocabulary_primitives:

  composite_post_quantum_signatures:
    description: >
      All identity and attestation signatures use composite keypairs
      combining Ed25519 (classical) with ML-DSA-65 (NIST FIPS 204
      post-quantum). The same envelope verifies against both
      primitives. Cryptographic conformance includes RFC 8032 Ed25519
      deterministic KAT vectors and FIPS 204 ML-DSA-65 property-based
      tests (round-trip correctness, wrong-key rejection, wrong-
      message rejection, deterministic kid derivation, cross-SDK
      verification, key/signature size compliance) running in each of
      the four SDKs (TypeScript, Python, Go, Rust). Cross-SDK interop
      vectors confirm byte-identical signed envelopes across SDKs.
    rationale: >
      Not a signal type; a cryptographic property of every DCP-AI
      signature. Listed here because no other system in
      vocabulary.yaml currently ships post-quantum signatures by
      default, and this property has implications for audit retention
      horizons under EU AI Act Article 12 and similar frameworks.

  canonicalization_profile_dcp_jcs_v1:
    description: >
      `dcp-jcs-v1` is a self-contained normative canonicalization
      profile published as `spec/CANONICALIZATION_PROFILE.md`. It is
      a strict subset of RFC 8785 (JCS) that pins the cases JCS
      leaves implementation-defined: 9 normative rules covering key
      sort order, compact form, string escaping, integer-only numeric
      handling (with explicit acceptance of integer-valued floats
      `1.0`, `1.00`, `1e2` and rejection of `0.1`, `1e-1`, `NaN`,
      `±Infinity`), null preservation, a cross-language `undefined`
      mapping table for TypeScript, Python, Go, and Rust, boolean
      literals, and empty container semantics. Unicode normalization
      (NFC/NFD/NFKC/NFKD) is explicitly OUT OF SCOPE in v1, with
      documented rationale (avoids ICU dependency in every SDK; future
      `dcp-jcs-v2` MAY pin it).

      The bundle manifest carries an explicit field
      `canonicalization_profile: "dcp-jcs-v1"` declared in
      `schemas/v2/bundle_manifest.schema.json` with `const:
      "dcp-jcs-v1"`. The field is optional for backward compatibility
      (verifiers MUST assume `dcp-jcs-v1` when absent) and is set by
      default by every BundleBuilder across the four SDKs. Verifiers
      reject unknown values explicitly (TypeScript and Go via
      explicit checks, Python via Pydantic `Literal` at parse time).

      Cryptographic conformance is anchored in 14 shared edge-case
      interop vectors at
      `tests/interop/v2/interop_vectors.json#canonicalization.edge_cases`,
      consumed by all four SDKs. Each ACCEPT vector includes the
      expected canonical string and SHA-256 hash; the four SDKs
      assert byte-identical output against those fixtures on every
      CI run.
    rationale: >
      Not a signal type; a normative profile that pins the canonical
      bytes signed and hashed by every DCP-AI primitive. Listed here
      as a candidate input for cross-system convergence — the
      vocabulary repo is a natural home for a future
      `agent-receipt-canonicalization-profile-v1` co-authored across
      systems already producing signed receipts at this layer.

  dual_hash_merkle_root:
    description: >
      Audit chain Merkle roots computed with both SHA-256 and
      SHA3-256 in the dual-hash path (`dualMerkleRoot` /
      `dual_merkle_root`). Reduces collision risk over long audit
      retention horizons by requiring an attacker to produce
      collisions in two independent hash families simultaneously.
    rationale: >
      Cryptographic hardening property, not a separate signal type.

  blinded_responsible_principal_record:
    description: >
      The RPR binds a Citizenship Bundle to its human principal with
      PII hashing, so the binding can be verified without disclosing
      the principal's identifying data. Shipped with dedicated
      helpers in the Python SDK (`blind_rpr`, `verify_blinded_rpr`,
      `is_blinded_rpr`, `compute_pii_hash`); parity for other SDKs
      is planned.
    rationale: >
      Privacy-preserving property of the identity layer, not a
      standalone signal type.

  security_tiers:
    description: >
      Four declared security tiers (LOCAL, NETWORK, FEDERATED, GLOBAL)
      that modulate verification depth and policy enforcement at
      trust boundaries. Declared by deployment context at issuance
      time; not derived from evidence.
    rationale: "Governance scope boundary, not a signal type."

  bundle_presentation_modes:
    description: >
      A Citizenship Bundle can be presented at a trust boundary in
      four modes (`presentFull`, `presentCompact`, `presentReference`,
      `presentIncremental`), with a recommendation helper
      (`suggestPresentationMode`) that picks the appropriate mode for
      a given verifier context. Currently shipped in the TypeScript
      SDK.
    rationale: >
      Protocol mechanic at the identity layer; composes into the
      governance_attestation that results from a boundary crossing.

  rights_framework:
    description: >
      Four fundamental agent rights — identity persistence,
      transparent process, representation, operational continuity —
      with corresponding obligations. Part of DCP-08 (Rights and
      Obligations). Functional requirements for legitimate
      governance, not claims about agent consciousness.
    rationale: >
      Governance-layer framework. Emits no standalone signal type;
      compliance with the rights framework is implied by DCP-AI
      governance_attestation bundles.

  delegation_mandate:
    description: >
      Structured delegation mandate with explicit scope constraints,
      awareness thresholds that trigger escalation to human
      principal, and procedural accountability. Part of DCP-09
      (Delegation and Representation). All four SDKs ship the
      operational surface for mandate creation, validity
      verification, revocation, and interaction record generation.
    dcp_symbols:
      typescript: [createDelegationMandate, verifyMandateValidity, revokeDelegation, generateInteractionRecord]
      python: [create_delegation_mandate, verify_mandate_validity, revoke_delegation, generate_interaction_record]
      go: [CreateDelegationMandate, VerifyMandateValidity, RevokeDelegation, GenerateInteractionRecord]
      rust: [create_delegation_mandate, verify_mandate_validity, revoke_delegation, generate_interaction_record]
    rationale: >
      Delegation-layer primitive. Produces evidence that rides the
      governance_attestation bundle; the mandate itself is a
      structured authority-scope declaration rather than a
      standalone signal type.

# ─────────────────────────────────────────────────
# CROSSWALK SUMMARY
# ─────────────────────────────────────────────────
summary:
  signal_types_exact: 2                     # governance_attestation, trust_verification
  signal_types_partial: 2                   # entity_continuity, peer_review
  signal_types_non_equivalent: 1            # passport_grade (tier vs grade)
  signal_types_no_mapping: 8                # rest (out of DCP-AI scope)
  decision_trajectory_structural: 1         # decision_lineage
  decision_trajectory_no_mapping: 3         # baseline_revision, divergence_signal, trust_velocity
  constraints_no_mapping: 1                 # observation_window
  out_of_vocabulary_primitives: 8           # PQC signatures, dcp-jcs-v1 profile, dual-hash Merkle, blinded RPR, security tiers, presentation modes, rights framework, delegation mandate

  sdk_coverage_note: >
    DCP-01 through DCP-09 operational primitives are shipped across
    all four SDKs (TypeScript, Python, Go, Rust) at v2.8.x in the
    main branch. Naming follows the idiomatic convention of each
    language: camelCase in TypeScript, snake_case in Python and Rust,
    PascalCase in Go. Cross-SDK interop vectors at
    `tests/interop/v2/interop_vectors.json` are consumed by all four
    SDKs and validate byte-identical signed envelopes on CI; the
    `canonicalization.edge_cases` category in v2.8.0 added 14 vectors
    pinning the `dcp-jcs-v1` profile. Test counts at the time of
    crosswalk authoring: 461 TypeScript, 236 Python, 4 Go packages
    passing, 181 Rust tests across 10 binaries. CodeQL scanning shows
    zero open alerts.

    Cryptographic conformance includes RFC 8032 Ed25519 deterministic
    KAT vectors (3 official vectors from RFC 8032 Section 7.1, run in
    each of the four SDKs) and FIPS 204 ML-DSA-65 property-based
    tests (sign/verify round-trip, wrong-key rejection, wrong-message
    rejection, deterministic kid derivation, cross-SDK verification,
    key/signature size compliance: pk=1952 bytes, sig=3309 bytes,
    nist_level=3). Property-based testing rather than full ACVP KAT
    is used for ML-DSA-65 because ML-DSA signing is randomized; the
    same property suite runs in all four SDKs.

  protocol_version_pinning: >
    All mappings hold for DCP-AI v2.8.x across the four reference
    SDKs in the main branch. Signal-type semantics are byte-identical
    across SDKs, validated by cross-SDK interop vectors in CI under
    the `dcp-jcs-v1` canonicalization profile. Downstream vocabulary
    consumers do not need to version-pin against a specific SDK for
    signal-type correctness.

