  fixture_pack: "Inlined under composition_rules.handoff_decay_then_rebuild.fixtures_inline above. Full JSON forms (signed_payload examples, side_effects records, AIP-13 / ERC-8004 composition detail) available on request and can migrate to a stable host as a follow-up."
  reference_implementation: "FractalNode SDK (https://github.com/AuthorPrime/fractalnode), signal_frame_chain in src/signal/"
