# crosswalk/rfc-category-taxonomy.yaml
#
# Reverse crosswalk: vocabulary signal_types → A2A RFC trust evidence
# category taxonomy. Promised to @AlexanderLawson17 on
# A2A Discussion #1734 via @douglasborthwick-crypto's offer to draft.
#
# This file is structurally different from the per-system forward
# crosswalks (insumerapi.yaml, satp/) that map ONE issuer's internal
# names to the canonical vocabulary. This file maps the canonical
# vocabulary OUT to a target taxonomy that is itself still being
# drafted in an upstream A2A RFC.
#
# The mapping is intentionally early. The A2A RFC categories are
# proposed names, not formalized values, and several rows below
# require issuer review before they are accurate enough to merge.
# Reviewers tagged inline; PR description repeats the list.

crosswalk_type: rfc_category_reverse
source_vocabulary: agent-governance-vocabulary/vocabulary.yaml
source_vocabulary_version: "0.1.0"
target_taxonomy: a2a-rfc-trust-evidence
target_taxonomy_version: "draft (not yet formalized)"
target_discussion: https://github.com/a2aproject/A2A/discussions/1734
status: draft_v0.1_awaiting_rfc_v0.2_formalization

# Authoritative source markdowns this YAML tracks. When the markdowns
# update, this YAML updates in the same PR. Both files live in
# douglas's insumer-examples repo and are versioned alongside
# MULTI-ATTESTATION-SPEC.md.
reference_drafts:
  - path: douglasborthwick-crypto/insumer-examples/rfc-contributions/crosswalk-to-rfc-1734.md
    role: "Long-form markdown source for this YAML, drafted by @douglasborthwick-crypto"
  - path: douglasborthwick-crypto/insumer-examples/rfc-contributions/wallet-state-section-3x.md
    role: "Authoritative wallet_state Section 3.x formalization — cross-reference for row 1 wallet_state"

# Dual-home mechanic: how a signal_type formally declares membership
# in multiple RFC categories. Three rows below (wallet_intelligence,
# passport_grade, trust_verification) carry dual_home_candidate: true
# but the actual mechanic (category array? primary+secondary?
# composite envelope?) is an open question for v0.2.
dual_home_mechanic: unresolved_v0.2
dual_home_mechanic_note: |
  v0.1 marks dual-home candidates with alternate_category. The
  mechanic by which a signal_type formally declares membership in
  multiple categories (category array? primary+secondary? composite
  envelope?) is an open question for v0.2. See open_questions
  passport_grade_dual_home_mechanic and
  wallet_intelligence_homing_shape.

# ─────────────────────────────────────────────────
# MATCH TYPES (REVERSE CROSSWALK)
# These four are scoped to the reverse-crosswalk direction. They are
# narrower than the vocabulary.yaml > crosswalk_match_types set
# because the reverse direction has different failure modes than the
# system→vocab direction (no question of "different field names";
# only of "does the target taxonomy contain a corresponding bucket").
# ─────────────────────────────────────────────────
match_types:
  exact:
    definition: "Vocabulary signal_type maps 1:1 to a single proposed RFC category. Same name expected once the RFC formalizes."
  extends:
    definition: "Vocabulary signal_type is a strict subtype of a broader RFC category (signal carries fields the parent category does not require)."
  partial:
    definition: "Vocabulary signal_type and the proposed RFC category overlap but neither contains the other. Specify dimensions of divergence in notes."
  no_analog:
    definition: "Proposed RFC category does not yet have a slot for this signal_type. Honest gap, surfaced for the RFC authors to consider."

# ─────────────────────────────────────────────────
# MAPPINGS — TEN ROWS, ONE PER MULTI-ATTESTATION-SPEC SIGNAL TYPE
# Order matches MULTI-ATTESTATION-SPEC.md.
# ─────────────────────────────────────────────────
mappings:

  # ───── 1 ─────────────────────────────────────────
  # REVIEWED by @douglasborthwick-crypto 2026-04-10 — field list
  # corrected against crosswalk/insumerapi.yaml > signal_types.wallet_state
  # > signed_shapes and MULTI-ATTESTATION-SPEC.md §3.1 / §5.6.
  # Revettr retraction: @AlexanderLawson17 re-homed Revettr to row 3
  # (wallet_intelligence) on 2026-04-11 after reading the 3.x.md
  # scope — Revettr does not run a predicate evaluation engine, so
  # wallet_intelligence is the correct category home. Row 1 stays
  # InsumerAPI-only.
  - signal_type: wallet_state
    target_category: wallet_state            # proposed, name expected to mirror signal_type
    target_category_status: proposed
    match: exact
    issuers_in_production:
      - InsumerAPI
    signed_payload_fields:
      # Fields from the compact-JWS path (attest_jwt) — wallet inside signature scope via sub claim.
      # Per crosswalk/insumerapi.yaml > signal_types.wallet_state > signed_shapes.attest_jwt.
      - "iss"                        # https://api.insumermodel.com
      - "sub"                        # wallet address (EVM, Solana, XRPL, or Bitcoin — all land here)
      - "jti"                        # attestation ID (ATST-...)
      - "iat"
      - "exp"                        # iat + 1800s (30 minute TTL)
      - "pass"                       # aggregate boolean across all conditions
      - "conditionHash"              # array, SHA-256 per canonical evaluated condition
      - "blockNumber"                # hex, per-condition evaluation block
      - "blockTimestamp"             # ISO 8601, per-condition block freshness
      - "results[]"                  # per-condition array; each carries its own met, chainId, evaluatedCondition, conditionHash, blockNumber, blockTimestamp
      # Per-result fields inside results[]:
      - "results[].met"              # per-condition boolean — this is the primitive
      - "results[].chainId"
      - "results[].evaluatedCondition"   # exact condition parameters (type, chainId, contractAddress, operator, threshold, decimals)
      - "results[].conditionHash"
      - "results[].blockNumber"
      - "results[].blockTimestamp"
    payload_fields_source: |
      Lifted directly from crosswalk/insumerapi.yaml > signal_types.wallet_state
      > signed_shapes.attest_jwt in this repository, verified against a live
      POST /v1/attest call on 2026-04-10 (JWT header {alg: ES256, typ: JWT,
      kid: insumer-attest-v1}, canonical ES256 P-256 signature validating
      against https://insumermodel.com/.well-known/jwks.json).

      The raw-signature path (signed_shapes.attest_raw) and the curated
      trust-profile path (signed_shapes.trust) have slightly different
      top-level shapes — see insumerapi.yaml for the full per-endpoint
      breakdown. The JWT claim set above is the most portable of the three
      and is recommended as the reference shape for the RFC category.
    notes: |
      Foundation layer of the multi-attestation envelope. InsumerAPI covers
      33 chains today (30 EVM + Solana + XRPL + Bitcoin) and stamps
      `type: "wallet_state"` directly into the envelope.

      **Critical category-design note: `wallet_state` attestations expose
      BOOLEAN threshold satisfaction, NOT BALANCES.** This is architecturally
      load-bearing for any privacy-preserving wallet_state implementation
      and is enforced in the reference envelope as a hard rule
      (MULTI-ATTESTATION-SPEC.md §5.6):

        > wallet_state attestations expose boolean results (met: true/false),
        > not balances. This is by design — the relying party learns whether
        > a threshold was satisfied, not how much the wallet holds.

      The earlier draft of this row listed `balance`, `tx_count`, `age`, and
      `counterparty_diversity` as category-level fields. `balance` is
      explicitly NOT exposed by InsumerAPI by design — the privacy model
      hinges on threshold satisfaction, not balance disclosure. If the RFC
      formalizes `wallet_state` around balance disclosure, InsumerAPI cannot
      comply with its own proposed category — that is category drift away
      from the reference implementation that inspired the signal_type.

      The threshold-satisfaction model is also architecturally richer than
      balance read: consumers specify the condition (type, contractAddress,
      operator, threshold), the issuer evaluates against it at a named block,
      and the signed result proves satisfaction without revealing the
      underlying position. A single envelope can carry per-condition results
      across multiple chains with per-condition block references, which a
      balance-field-list cannot express.

      **On Revettr**: Alexander Lawson (Revettr) originally committed to
      splitting Revettr's current single-envelope signal into two envelopes
      — one `compliance_risk`, one `wallet_state` — in A2A #1734 comment
      16523189 on 2026-04-10. On 2026-04-11 Alexander RETRACTED the
      wallet_state half of that split after reading the Section 3.x draft
      (rfc-contributions/wallet-state-section-3x.md in insumer-examples).
      The 3.x draft scopes `wallet_state` to caller-supplied condition
      evaluation with a per-condition outcome shape (`pass`, `met`,
      `evaluatedCondition`, `conditionHash`, `refresh_hint` with
      `bound_block_number`/`bound_chain_id`/`max_age_seconds`/`stale_action`,
      and `conditionSetVersion`). Revettr does not run a predicate
      evaluation engine today and will not ship a shape it does not sign.
      Re-homing to `wallet_intelligence` (row 3) as observational summary
      statistics, which is the correct category home for what Revettr
      actually produces. See A2A #1734 comment 4228 (TBD link once
      Alexander's thread reply settles). Row 1 remains InsumerAPI-only,
      which is exactly what the 3.x scope implies.
    needs_issuer_confirmation: false
    reviewed_by: "@douglasborthwick-crypto"
    reviewed_at: "2026-04-10"
    revettr_split_status: |
      RETRACTED on 2026-04-11 by @AlexanderLawson17 after reading the
      Section 3.x draft. Revettr is re-homing the proposed
      "wallet_state" half of its planned split to row 3
      (wallet_intelligence) as observational summary statistics,
      because Revettr does not run a predicate evaluation engine and
      will not ship a shape it does not sign. The `compliance_risk`
      half of the originally proposed split is unaffected — row 5
      remains Revettr's production envelope today. See A2A #1734
      comment 16523189 (original commitment) and the follow-up
      retraction comment in the same thread.

  # ───── 2 ─────────────────────────────────────────
  - signal_type: behavioral_trust
    target_category: behavioral_trust        # proposed
    target_category_status: proposed
    match: exact
    issuers_in_production:
      - SATP
      - "MolTrust (per vocabulary.yaml issuers_in_production)"
      - "RNWY (per vocabulary.yaml issuers_in_production)"
    signed_payload_fields:
      - "trust_score.value (float 0..1)"
      - "trust_score.sample_size"
      - "trust_score.confidence"
      - "trust_score.task_class"
      - "derivation.inputs.window_end"
    payload_fields_source: |
      SATP fields lifted from crosswalk/satp/behavioral-trust.yaml
      (in this repo). Other issuer payloads (MolTrust, RNWY) are
      not yet documented as crosswalks here and may carry different
      field names; the union is TBD pending their respective
      crosswalk PRs.
    notes: |
      Per @douglasborthwick-crypto on vocabulary.yaml: canonical name
      is `behavioral_trust`, NOT `behavioral_fingerprint`. Fingerprint
      implies passive observation; trust implies scored assessment.
      Distinct primitives; the RFC category should preserve the
      distinction. Per OWASP PR #819 (referenced in the SATP
      crosswalk): gates MUST evaluate task-class-scoped scores, not
      cross-class aggregates. RFC category should require
      `task_class` as a structural field, not an optional one.
    needs_issuer_confirmation: true

  # ───── 3 ─────────────────────────────────────────
  # Apr 14 consensus (issue #6): @pshkv's Apr 11 wallet-addressed-
  # vs-wallet-state framing carried Apr 14 by @aeoess +
  # @douglasborthwick-crypto. wallet_intelligence homes as
  # `behavioral` (primary), with `wallet_state` retained as the
  # alternate on the addressing-index axis. Per
  # @douglasborthwick-crypto's Apr 14 10:12 wording: "Keeping
  # `wallet_state` as `dual_home_candidate` on the addressing-
  # index axis preserves the signal that the row happens to use
  # a wallet as key without collapsing the semantic distinction."
  # Consumer-side confirmation (separate artifact): @rnwy on
  # A2A#1734 comment 16704028, 2026-04-24, publicly restating
  # primary category as behavioral.
  - signal_type: wallet_intelligence
    target_category: behavioral              # Apr 14 consensus — primary
    target_category_status: proposed
    match: structural                        # Apr 14 consensus + PR #47 review — same question (behavioral classification), different surface (wallet-indexed quadrant payload); dual_home_rationale satisfies the structural-requires-divergence/notes check
    dual_home_candidate: true
    alternate_category: wallet_state         # flipped from behavioral — addressing-index axis
    dual_home_rationale: |
      Apr 14 consensus on issue #6: wallet_intelligence classifies
      longitudinal behavioral patterns over wallet history (Signal
      Depth / Risk Intensity quadrant), not chain-state-at-block-N.
      Primary home is `behavioral`. `wallet_state` is retained as
      the alternate on the addressing-index axis per @pshkv's
      Apr 11 wallet-addressed-vs-wallet-state framing — the row
      happens to use a wallet as key but the classification surface
      is behavioral, not positional. Dual-home preserves the
      addressing-index signal without collapsing the semantic
      distinction. Consumers composing with row 1 (wallet_state at
      block N) and this row (behavioral history of the same wallet)
      can weight the two signals independently.
      Consumer-side confirmation (separate artifact): @rnwy on
      A2A#1734 comment 16704028, 2026-04-24, publicly restating
      wallet_intelligence primary category as behavioral.
    issuers_in_production:
      - "RNWY Wallet (kid rnwy-wallet-v1)"
    signed_payload_fields:
      - iss
      - sub
      - wallet
      - signalDepth
      - riskIntensity
      - quadrant
      - activityZone
      - riskZone
      - issuedAt
      - verifiedAt
      - expiry
    payload_fields_source: |
      Enumerated from crosswalk/a2a.yaml > signal_types.wallet_intelligence.description
      per PR #32 (merged 2026-04-18 by @rnwy).
    notes: |
      Behavioral classification of wallet activity (sybil signals,
      volume patterns, sanctions proximity per vocabulary.yaml). The
      RFC category should accommodate quantitative classification
      outputs (sybil_severity, volume_class, etc.) without forcing
      a single scoring scheme.
    needs_issuer_confirmation: false

  # ───── 4 ─────────────────────────────────────────
  - signal_type: reasoning_integrity
    target_category: behavioral              # per douglas's markdown: behavioral subtype, not top-level
    target_category_status: proposed
    match: extends
    subtype: reasoning_integrity
    subtype_rationale: |
      Per @douglasborthwick-crypto on A2A#1734: ThoughtProof is the
      only current reference implementation, so promoting
      reasoning_integrity to a top-level category is premature.
      Better-fit is a subtype under behavioral, with promotion to
      top-level reserved for v0.3 if a second implementation
      surfaces. The markdown's exact framing: "behavioral already
      covers 'does the agent act within bounds,' and reasoning
      soundness is the per-invocation version of that question.
      One reference implementation is not enough to justify a new
      top-level category yet, so subtype is the v0.2 recommendation."
    issuers_in_production:
      - ThoughtProof
    signed_payload_fields:
      - "TBD — confirm with ThoughtProof on the action-attestation payload"
    payload_fields_source: |
      ThoughtProof's signed envelope is wallet-agnostic by design (per
      vocabulary.yaml: "Attestation surface = the action, not the
      actor"). Per douglas's markdown row: EdDSA compact JWS, signed
      `claimHash` + `verdict` + `mdi` + `confidence`. The exact claim
      set is documented in MULTI-ATTESTATION-SPEC.md §3.2 but not
      mirrored into a crosswalk file in this repo yet. Marking TBD
      until a ThoughtProof crosswalk lands.
    notes: |
      Wallet-agnostic primitive. The RFC category should NOT require
      a wallet field on this signal type — that would push every
      reasoning attestation into needing an unrelated identity
      anchor. The signed subject is the action artifact (e.g.,
      reasoning trace, output hash), not the actor. As a behavioral
      subtype, reasoning_integrity inherits behavioral's category
      shape but adds the per-invocation reasoning-soundness commit
      (`claimHash`, `verdict`, `mdi`, `confidence`).
    needs_issuer_confirmation: true

  # ───── 5 ─────────────────────────────────────────
  # NEEDS REVIEW: @AlexanderLawson17 — Revettr current envelope shape
  # This row covers Revettr's PRESENT production envelope (compliance-
  # only). The future Revettr wallet_state envelope is in row 1.
  - signal_type: compliance_risk
    target_category: compliance_risk         # proposed
    target_category_status: proposed
    match: exact
    issuers_in_production:
      - "Revettr (current single-envelope shape)"
    signed_payload_fields:
      - "TBD — confirm with @AlexanderLawson17 on the current Revettr signed envelope claim set"
    payload_fields_source: |
      Revettr's current production envelope mixes compliance-risk
      and on-chain state fields. The v0.2 split (separating
      compliance_risk from a dedicated wallet_state envelope) is
      proposed but not yet shipped. This row reflects what is in
      production TODAY, not the future split.
    notes: |
      Per @douglasborthwick-crypto on vocabulary.yaml: distinct from
      `compliance_credential`. Credential = holder possesses X. Risk
      = scored exposure. The RFC should keep the two terms distinct;
      collapsing them loses the directionality of the signal (risk
      is something you have exposure to, not something you possess).
      [REVIEW: @AlexanderLawson17 — please confirm the current
      Revettr signed payload field set so this row stops saying TBD.]
    needs_issuer_confirmation: true
    revettr_split_status: "PROPOSED — pending v0.2 RFC formalization, not yet split in production. Current Revettr envelope still mixes compliance-risk + on-chain state fields."

  # ───── 6 ─────────────────────────────────────────
  # NOTE: target_category currently mirrors signal_type name per the
  # YAML's v0.1 1:1-naming assumption (open_question q1). Per
  # @douglasborthwick-crypto's crosswalk-to-rfc-1734.md, this signal
  # is NOT a top-level RFC category — the markdown explicitly
  # dual-homes it under `identity` + `sovereignty`. The dual_home
  # fields below capture douglas's two-home recommendation
  # (alternate_category: sovereignty, with identity as the implied
  # primary); the existing target_category is preserved for now and
  # flagged here for reconciliation in v0.2.
  - signal_type: passport_grade
    target_category: passport_grade          # proposed (NOTE: misaligned with douglas's markdown — see comment above)
    target_category_status: proposed
    match: exact
    dual_home_candidate: true
    alternate_category: sovereignty
    dual_home_rationale: |
      Per @douglasborthwick-crypto on A2A#1734: APS emits both an
      identity-evidence grade and a governance-attestation envelope
      from the same issuer. Passport grade (0-3) measures identity
      evidence tier depth — directly identity. The
      governance-attestation variant covers active constraints and
      delegation chain — maps to sovereignty ("how much control the
      agent has over itself"). Dual-homing under identity +
      sovereignty is the cleanest mapping today; recommendation in
      douglas's markdown is dual-home via array:
      "category": ["identity", "sovereignty"]. An alternative is to
      split the issuer into two reference implementations — one
      under each category — but that loses the fact that APS
      deliberately couples the two dimensions.
    issuers_in_production:
      - "APS / AEOESS (gateway.aeoess.com)"
    signed_payload_fields:
      - passport_grade                       # 0..3
      - attestation_bundle_hash
      - "issuer (e.g. https://gateway.aeoess.com)"
      - issued_at
      - expires_at
    payload_fields_source: |
      APS passport_grade is a composite trust grade (0–3) derived
      from issuance evidence and surfaced through the gateway public
      trust profile at /api/v1/public/trust/{agentId}/attestation
      as an Ed25519-signed JWS. The five fields above are the
      stable claim set in the public attestation envelope. A formal
      APS crosswalk file (planned per README) will document this
      end-to-end.
    notes: |
      Composite trust grade rather than a raw measurement. The RFC
      category should treat passport_grade as a categorical
      enumeration (the four grades) with attached evidence
      references, not as a continuous score.
    needs_issuer_confirmation: false

  # ───── 7 ─────────────────────────────────────────
  # NOTE: target_category currently mirrors signal_type name per the
  # YAML's v0.1 1:1-naming assumption (open_question q1). Per
  # @douglasborthwick-crypto's crosswalk-to-rfc-1734.md, this signal
  # is NOT a top-level RFC category — the markdown homes it under
  # `identity` (primary) with `behavioral` as a possible secondary
  # ("the behavioral risk/context continuity fields overlap
  # behavioral and could be dual-homed if the WG prefers"). The
  # dual_home fields below capture this hedge; the existing
  # target_category is preserved for now and flagged here for
  # reconciliation in v0.2. Note: douglas's markdown table marks
  # this row "Direct" not "Dual-home candidate"; the dual-home
  # reading comes only from the row notes, not the headline.
  - signal_type: trust_verification
    target_category: trust_verification      # proposed (NOTE: misaligned with douglas's markdown — see comment above)
    target_category_status: proposed
    match: exact
    dual_home_candidate: true
    alternate_category: behavioral
    dual_home_rationale: |
      Per @douglasborthwick-crypto on A2A#1734: identity is the
      primary home; the behavioral risk/context continuity score
      and context_continuity_score fields overlap behavioral and
      could be dual-homed if the WG prefers. AgentID emits a
      single envelope that carries both identity-layer claims
      (DID, wallet_address, bound_addresses, trust level) and
      behavioral-layer claims (behavioral risk score, context
      continuity score, scarring counts). The hedge in douglas's
      markdown is intentional — primary recommendation is single
      home (identity), with dual-home flagged as a WG decision
      rather than a strong assertion.
    issuers_in_production:
      - "AgentID (haroldmalikfrimpong-ops)"
      - "APS (per vocabulary.yaml — secondary issuer of trust_verification)"
    signed_payload_fields:
      - "TBD — confirm with @haroldmalikfrimpong-ops on AgentID's signed claim set"
    payload_fields_source: |
      AgentID's trust_verification envelope shape is not documented
      in this repo as a crosswalk. APS issues a parallel
      trust_verification signal via the gateway public trust
      profile. The exact union of fields across the two issuers is
      TBD pending the AgentID crosswalk PR.
    notes: |
      Identity-layer verification status (per vocabulary.yaml: Grade
      1-3, KYC presence, principal endorsement). The RFC category
      should distinguish trust_verification (identity layer) from
      passport_grade (composite trust grade). They are adjacent
      primitives, not the same primitive.
    needs_issuer_confirmation: true

  # ───── 8 ─────────────────────────────────────────
  - signal_type: security_posture
    target_category: security_posture        # proposed
    target_category_status: proposed
    match: exact
    issuers_in_production:
      - "AgentGraph (kenneives)"
    signed_payload_fields:
      - "TBD — confirm with @kenneives on AgentGraph's signed claim set"
    payload_fields_source: |
      AgentGraph's security_posture envelope is wallet-discoverable
      rather than wallet-bound: the signed subject is the artifact
      (github:owner/repo, commit hash, output) and the wallet is a
      lookup key into the artifact graph. Per vocabulary.yaml.
      Field set is not documented in this repo; marking TBD.
    notes: |
      Wallet-discoverable. The RFC category should NOT require a
      wallet field in signed scope — the artifact is the subject.
      This is structurally similar to settlement_witness (row 10)
      in that respect, and the RFC may choose to mark both as
      "wallet-discoverable" rather than "wallet-bound" to preserve
      that distinction.
    needs_issuer_confirmation: true

  # ───── 9 ─────────────────────────────────────────
  - signal_type: job_performance
    target_category: job_performance         # proposed
    target_category_status: proposed
    match: exact
    issuers_in_production:
      - Maiat
    signed_payload_fields:
      - "TBD — confirm with Maiat on the wallet-bound job-completion claim set"
    payload_fields_source: |
      Per vocabulary.yaml: Maiat issues job_performance as a
      wallet-bound assessment of completed task outcomes. Field set
      is not documented in this repo; marking TBD.
    notes: |
      Wallet-bound (the wallet is in the signed subject). Distinct
      from settlement_witness (row 10) in that job_performance is
      an assessment summary across many actions, while
      settlement_witness is bound to a specific completed action.
      The RFC may want a hierarchical relationship: job_performance
      AGGREGATES settlement_witness records.
    needs_issuer_confirmation: true

  # ───── 10 ─────────────────────────────────────────
  - signal_type: settlement_witness
    target_category: settlement_witness      # proposed
    target_category_status: proposed
    match: exact
    issuers_in_production:
      - "SAR (defaultverifier.com)"
    signed_payload_fields:
      - "TBD — confirm with SAR on the action-bound outcome attestation claim set"
    payload_fields_source: |
      Per crosswalk/insumerapi.yaml notes: SAR receipts are wallet-
      bound under kid sar-prod-ed25519-03 (shipped 2026-04-10) and
      wallet-discoverable under legacy kids -02 / -01. Field set is
      not documented in this repo; marking TBD.
    notes: |
      Action-bound rather than agent-bound. The signed subject is
      the completed action artifact, with the wallet appearing in
      signed scope on new (kid -03) receipts and as a discoverable
      lookup key on legacy receipts. The RFC category should
      accommodate both binding modes during the migration period.
    needs_issuer_confirmation: true

# ─────────────────────────────────────────────────
# OPEN QUESTIONS FOR THE A2A RFC AUTHORS
# Surfacing these in the crosswalk file so they travel with the PR
# and the discussion thread, rather than getting lost in review
# comments.
# ─────────────────────────────────────────────────
open_questions:

  - id: q1
    question: |
      Should the RFC category names mirror the vocabulary signal_type
      names exactly, or should the RFC use its own taxonomy and
      crosswalk to the vocabulary?
    current_assumption: "This file assumes 1:1 name alignment (`match: exact` on every row). If the RFC chooses different names, every row's `target_category` flips and most match types may drop to `partial`."

  - id: q2
    question: |
      Should the RFC distinguish wallet-bound signals from
      wallet-discoverable signals as a structural property of each
      category?
    rationale: "Rows 8 (security_posture) and 10 (settlement_witness) are wallet-discoverable; rows 1, 9, and most of 7 are wallet-bound; row 4 (reasoning_integrity) is wallet-agnostic. A consumer that doesn't know which mode a category uses cannot write a correct verifier."

  - id: q3
    question: |
      Where does the proposed Revettr split (compliance_risk +
      wallet_state) land in the RFC migration timeline?
    rationale: "Rows 1 and 5 both reference Revettr. Today Revettr emits a single mixed envelope; the v0.2 split is proposed but not shipped. The RFC categories will be more useful if they accommodate the migration window, not just the post-split state."
    needs: "@AlexanderLawson17 confirmation on Revettr's split timeline"

  - id: q4
    question: |
      Should job_performance (row 9) and settlement_witness (row 10)
      be hierarchically related in the RFC?
    rationale: "job_performance is an aggregate assessment across many actions; settlement_witness is bound to a single completed action. A hierarchical relationship would let consumers ask 'which settlement_witness records back this job_performance score?' without separate orchestration."

  # ───── Open questions added per @douglasborthwick-crypto's
  # follow-up on A2A#1734. Each one tracks an unresolved decision
  # surfaced by the dual-home and subtype framing edits above.
  # Source: rfc-contributions/crosswalk-to-rfc-1734.md "Open
  # questions for v0.2 review" section.

  - id: wallet_intelligence_homing_shape
    status: resolved_apr14
    resolution: |
      Apr 14 consensus on issue #6: @pshkv's Apr 11 wallet-
      addressed-vs-wallet-state framing carried Apr 14 by @aeoess
      + @douglasborthwick-crypto. Primary category is `behavioral`,
      alternate is `wallet_state` on the addressing-index axis.
      dual_home_candidate: true kept. See row 3 for the applied
      diff. Consumer-side confirmation (separate artifact): @rnwy
      on A2A#1734 comment 16704028, 2026-04-24.
    original_framing: |
      wallet_intelligence sits between wallet_state and behavioral.
      Needs a dual_home_mechanic decision before v0.2 freezes.
      Per douglas's markdown: should RNWY rnwy-wallet-v1 be
      primarily wallet_state with a behavioral_overlap flag, or
      should the RFC introduce a wallet_behavioral category to
      cleanly separate "on-chain position at block N" from
      "on-chain behavioral history of the wallet as an actor"?
      The two signals compose differently and consumers may want
      to weight them separately.

  - id: reasoning_integrity_subtype_vs_top_level
    status: subtype_in_v0.1
    framing: |
      v0.1 marks this as extends behavioral with subtype
      reasoning_integrity. Promotion to top-level category
      reserved for v0.3 pending second reference implementation.
      Per douglas's markdown: ThoughtProof's signed claimHash +
      verdict pattern does not fit behavioral perfectly —
      behavioral implies runtime bound-checking, reasoning
      soundness is pre-runtime. One reference implementation is
      not enough to justify a new top-level category yet, so
      subtype is the v0.2 recommendation.

  - id: passport_grade_dual_home_mechanic
    status: unresolved_v0.2
    framing: |
      passport_grade sits between identity and sovereignty.
      "category": ["identity", "sovereignty"] as an array is the
      cleanest mechanic but is not yet in the RFC schema. Per
      douglas's markdown: APS deliberately couples both layers,
      so splitting the issuer into two reference implementations
      (one per category) would lose that coupling. The array
      mechanic preserves it.

  - id: peer_review_coverage_gap
    status: no_production_issuer_currently_maps
    framing: |
      Per @douglasborthwick-crypto: none of the ten
      MULTI-ATTESTATION-SPEC issuers lands cleanly in a
      peer_review category. RFC should either drop the category
      or add peer_review to the WG issuer solicitation list.
      Closest fit: RNWY's reviewer-credibility and
      reviewer-diversity fields inside the §3.3.1 evidence
      extension could be surfaced as a peer_review subtype, or
      an aeoess governance-attestation vouch chain could fill
      the slot. Defer to @rnwy and @aeoess.

  - id: continuous_monitoring_semantics
    status: unresolved_v0.2
    framing: |
      Is continuous_monitoring reserved for standing-pipeline
      issuers (polling, streaming) or does it also absorb
      point-in-time derived signals computed on each request?
      Semantic ambiguity affects how trust_velocity and
      divergence_signal map. Per douglas's markdown
      recommendation: continuous_monitoring is for the standing
      pipeline model (nightly refresh, time-series); point-in-time
      signals derived from monitoring data stay under their
      primary category. AgentGraph's on-chain monitoring fits the
      former; RNWY's sybil reactivity stays under behavioral.

