changes:
  - version: "0.1.0"
    date: "2026-04-26"
    author: "lowkey-divine (Evoked)"
    summary: |
      Initial crosswalk for FMS v0.2.0 against vocabulary.yaml v0.1.
      Three partial signal_type matches (governance_attestation,
      behavioral_trust, entity_continuity), ten no_mapping entries
      with rationale, four descriptor-layer contributions (Hold/Bend/Break
      tuples for the identity-under-pressure indicator, pressure-classification
      reading, dimensionScores temporal validity, evaluationContextHash
      action-class scope). Pre-publication review confirmed per Evoked's
      interoperability protocol. Pinned to FMS v0.2.0 versioned reference URL.
