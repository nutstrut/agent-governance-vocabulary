# Agent Governance Vocabulary v0.1
# Canonical names for governance primitives across multi-issuer agent ecosystems.
# Each system keeps its internal code; this layer provides shared reference + crosswalks.
#
# Precedent: IANA JWT claim registry, JSON-LD @context.
# Co-authored: aeoess + QueBallSharken + douglasborthwick-crypto + MoltyCel + invited WG.
# License: Apache-2.0

version: "0.1.0"
status: "draft - open for WG review"

# ─────────────────────────────────────────────────
# SIGNAL TYPES
# Categorical labels stamped into signed envelopes.
# Already in production across 9+ issuers via the multi-attestation envelope.
# Renaming live values is OUT OF SCOPE - canonical aligns with envelope.
# ─────────────────────────────────────────────────
signal_types:
  wallet_state:
    definition: "Foundation-layer wallet attestation: balances, on-chain holdings, identity attachments."
    issuers_in_production: ["InsumerAPI"]

  behavioral_trust:
    definition: "Scored trust assessment derived from observed agent behavior over time."
    issuers_in_production: ["RNWY", "MolTrust"]
    notes: "Per @douglasborthwick-crypto: canonical name is `behavioral_trust`, NOT `behavioral_fingerprint`. Fingerprint implies passive observation; trust implies scored assessment. Distinct primitives."

  wallet_intelligence:
    definition: "Behavioral classification of wallet activity (sybil signals, volume patterns, sanctions proximity)."
    issuers_in_production: ["RNWY"]

  reasoning_integrity:
    definition: "Attestation surface = the action, not the actor. Wallet-agnostic by design."
    issuers_in_production: ["ThoughtProof"]

  compliance_risk:
    definition: "Scored exposure assessment (counterparty flagged or clean). NOT a positive credential."
    issuers_in_production: ["Revettr"]
    notes: "Per @douglasborthwick-crypto: distinct from `compliance_credential`. Credential = holder possesses X. Risk = scored exposure. Keep both as distinct terms; do not collapse."

  governance_attestation:
    definition: "Signed attestation that an agent or action satisfied a declared governance requirement (policy, delegation scope, compliance check, etc.). Distinct from compliance_risk (scored exposure) and trust_verification (identity layer status)."
    issuers_in_production: ["AgentNexus", "Nobulex", "SINT", "APS"]
    notes: "Canonicalized Apr 15 after 3 independent implementations surfaced. Per CONTRIBUTING.md threshold (2+ implementations). APS added Apr 17 as 4th production issuer via Build D2 signed trust profile endpoint (gateway.aeoess.com/api/v1/public/trust/:agentId, verified against gateway JWKS)."
    descriptor_dimensions:
      enforcement_class: binding
      validity_temporal: at_issuance
      refusal_authority: structurally_impossible_to_violate
      invariant_survival: post_action
      replay_class: full_replay
      governed_action_class: publish

  passport_grade:
    definition: "Composite trust grade from agent passport issuance evidence."
    issuers_in_production: ["APS"]

  trust_verification:
    definition: "Identity layer verification status (Grade 1-3, KYC presence, principal endorsement)."
    issuers_in_production: ["AgentID", "APS"]

  security_posture:
    definition: "Wallet-discoverable: signed subject is the artifact (repo, commit, output), wallet is lookup key."
    issuers_in_production: ["AgentGraph"]

  job_performance:
    definition: "Wallet-bound assessment of completed task outcomes."
    issuers_in_production: ["Maiat"]

  settlement_witness:
    definition: "Wallet-discoverable: outcome attestations bound to action artifacts. Wallet-bound for post-upgrade receipts under kid `sar-prod-ed25519-03` (counterparty now inside signed bytes)."
    issuers_in_production: ["SAR"]

  peer_review:
    definition: >
      Task-completion attestation signed by a delegating agent after a
      service agent completes work. Answers: did this agent actually do
      what it claims? Distinct from behavioral_trust (observed patterns)
      and settlement_witness (outcome receipts) — peer_review is a
      first-party attestation from the task delegator about the task
      executor's delivery.
    descriptor_dimensions:
      enforcement_class: advisory
      validity_temporal: at_issuance
      refusal_authority: consumer_policy
      invariant_survival: post_action
      replay_class: full_replay
      governed_action_class: delegate
    issuers_in_production: ["Logpose", "RNWY"]
    notes: |
      W3C Verifiable Credentials 2.0 envelope. Ed25519 via @noble/curves.
      did:key identity (multicodec 0xed01, base58btc). RFC 8785 JCS
      canonicalization. npm: @logpose-dev/logpose.
      The W3C VC IS the attestation — not a wrapper around a separate
      payload format.

      Scope note (2026-04-17): the two production implementations
      attest at different reference points — Logpose at task completion
      (did the executor deliver?), RNWY at reviewer credibility (are the
      reviewers trustworthy?). The signed-envelope shape is shared; the
      reference point is not. Implementers should declare their
      reference point explicitly in the attestation payload. If a third
      implementation surfaces that forces the split, a follow-up issue
      will propose narrowing peer_review and introducing a separate
      canonical term (e.g. reviewer_credibility) per the CONTRIBUTING.md
      "two independent implementations" threshold applied per-primitive.
  entity_continuity:
    status: proposed
    proposed_by: ["SBR Protocol (crosswalk/soulboundrobots.yaml)"]
    definition: >
      Cryptographic proof that the same agent identity persists across an
      infrastructure change — key rotation, host migration, execution
      environment swap, or any event that would otherwise break identity
      by default. Answers: is this still the same agent? Distinct from
      behavioral_trust (earned reputation) and consent_provenance
      (authorization chain) — entity_continuity establishes identity
      persistence as the prior condition for both.
    issuers_in_production: ["SBR Protocol"]
    notes: |
      ES256 / P-256 signed JWT. JWKS at soulboundrobots.ai/.well-known/jwks.json.
      On-chain registration via EAS on Base.
      EAS schema: 0xbc21ace81780fe7c494fd985b4b220698d23a79ca4f92db349209b75908519ce
      Five migration types: owner_upgrade, maintenance_swap, emergency_evacuation,
      employment_transfer, hot_swap. Snapshot evidence only.
      
    measurement_point:
      type: enum
      values: ["session_boundary", "mutation_boundary"]
      
    descriptor_dimensions:
      enforcement_class: advisory
      validity_temporal: at_issuance
      refusal_authority: consumer_policy
      invariant_survival: post_action
      replay_class: full_replay
      governed_action_class: publish

# ─────────────────────────────────────────────────
# DESCRIPTOR DIMENSIONS (per @QueBallSharken)
# Each canonical term carries descriptor metadata answering concrete governance questions.
# ─────────────────────────────────────────────────
descriptor_dimensions:
  enforcement_class:
    question: "Is this artifact advisory, binding, or an enforceable refusal condition?"
    values: ["advisory", "binding", "refusal_authority"]

  validity_temporal:
    question: "When is validity established and when must it still hold?"
    values: ["at_issuance", "at_acceptance", "at_processing", "continuously", "sequence", "windowed"]
    notes: |
      `sequence` and `windowed` were added to support the decision_trajectory
      section (per @nanookclaw, PDR Section 8). `sequence` denotes longitudinal
      ordered records (e.g. decision_lineage); `windowed` denotes signals
      collected over an explicitly declared observation_window.

  refusal_authority:
    question: "Where does actual refusal authority live?"
    values: ["issuer", "verifier", "consumer_policy", "shared"]

  invariant_survival:
    question: "How far does the invariant survive toward the irreversible primitive?"
    values: ["pre_action", "during_action", "post_action", "permanent"]

  replay_class:
    question: "What level of replay is possible from recorded evidence alone?"
    values: ["full_replay", "decision_replay", "fingerprint_only", "no_replay"]

  governed_action_class:
    question: "What class of action is being governed?"
    values: ["read", "write", "transfer", "delegate", "publish", "compose"]

# ─────────────────────────────────────────────────
# CONTEXT DIMENSIONS (per @pshkv + @tomjwxf + #26 convergence)
# Values the evaluator derives or accumulates at decision time, whether or
# not any issuer was involved. Distinct from signal_types (issuer-signed)
# and descriptor_dimensions (governance-force properties of a signal).
# The test that keeps this section from drifting back into signal semantics:
# if an issuer could sign it, it belongs in signal_types instead.
# v0.1 draft, 4 day-1 entries. resolution_source enum is recommended (not
# required) in v0.1 — fields are documented at each entry but entries may
# be published without one and add it in v0.2 without a breaking change.
# For dimensions where the resolution source varies per evaluation (notably
# physical_environment_state), the field at the definition level records
# the most common path; the actual resolution source travels on each
# per-evaluation value. See note under physical_environment_state.
# ─────────────────────────────────────────────────
context_dimensions:
  counterparty_standing:
    definition: >
      Per-evaluation context value capturing the standing of the counterparty
      to a proposed action. Policy engines compose it from multiple signed
      signals (wallet account age, KYC tier, prior-completion count,
      jurisdiction) plus unsigned request context to gate commitment-class
      actions on counterparty maturity.
    non_signal_test: >
      No single issuer can sign counterparty_standing because the value is
      derived at evaluation time from a composition of multiple signed
      signals plus unsigned runtime context. An issuer can sign a
      contributing signal (e.g. wallet_state.account_age, peer_review
      completion record) but not the composed standing.
    implementations:
      - "protect-mcp (Cedar context attribute)"
    example_fields:
      - "context.counterparty_account_age_days"
      - "context.counterparty_completion_count"
      - "context.counterparty_kyc_tier"
    composing_signals_examples:
      - wallet_state
      - trust_verification
      - peer_review
      - settlement_witness
    resolution_source: signal_composed
    notes: |
      First-impl seeded via protect-mcp Cedar policies (tomjwxf). Second
      implementation required before canonical promotion per the same 2+
      rule used for signal_types.

  request_origin:
    definition: >
      Per-evaluation context value capturing where the request arrived
      through at decision time: direct vs relay, trusted vs untrusted
      boundary, internal-network vs public-network origin, jurisdiction
      of arrival point. Derived by the gateway or resolver at request time,
      not attested by any issuer.
    non_signal_test: >
      No issuer can sign request_origin because the value is a property of
      the request arrival event itself. An issuer could sign a policy that
      consumes request_origin (e.g. "require trusted-boundary for transfer
      actions") but cannot pre-attest the origin of a future request.
    implementations:
      - "protect-mcp (Cedar context attribute)"
      - "SINT runtime (boundary-security evaluation)"
    example_fields:
      - "context.request_source"
      - "context.request_channel"
      - "context.arrival_boundary"
      - "context.origin_jurisdiction"
    resolution_source: gateway_derived
    notes: |
      Cross-implementation convergence from protect-mcp Cedar policies
      (tomjwxf, boundary-security patterns) and SINT runtime (pshkv,
      network-boundary enforcement). Two-impl threshold potentially already
      met; defer canonical promotion until the resolution_source field is
      settled for the section as a whole.

  session_dynamics:
    definition: >
      Per-evaluation context value capturing facts about the live
      interaction session: session age, cumulative tool calls in session,
      prior denials in session, retry depth, whether escalation has
      already triggered in-session. Accumulated by the gateway over the
      session lifetime, not attested by any issuer.
    non_signal_test: >
      No issuer can sign session_dynamics because the values exist only
      within a session boundary and are not persisted or attested outside
      that boundary. Distinguishes this from counterparty_standing, which
      also composes multiple inputs but persists across sessions.
    implementations:
      - "protect-mcp (Cedar context attribute)"
      - "SINT runtime (session-scoped enforcement)"
    example_fields:
      - "context.session_tool_count"
      - "context.prior_deny_count"
      - "context.retry_depth"
      - "context.session_age_seconds"
      - "context.escalated_to_human"
    resolution_source: gateway_accumulated
    notes: |
      Key distinguishing property vs counterparty_standing is ephemerality:
      session_dynamics values live and die within the session boundary.
      Defining-contributor framing from pshkv: "values the enforcement
      surface itself accumulates, whether or not any issuer was involved."

  physical_environment_state:
    definition: >
      Per-evaluation context value capturing physical-world state at
      decision time: temperature, velocity, force, geofence status,
      human proximity, interlock state, permit state. Sourced from
      sensors or physical attestors; evaluated by policy engines in
      cyber-physical contexts (robots, vehicles, industrial systems,
      cold chain).
    non_signal_test: >
      No issuer can sign physical_environment_state because the value
      changes by the second and is a property of the physical world at
      the moment of evaluation, not an attestable claim about past
      state. A sensor can sign a reading of the state at a point in
      time, but the dimension itself is the live value consumed at
      decision time.
    implementations:
      - "SINT runtime (DynamicEnvelopePlugin)"
      - "ScopeBlind cold chain attestation (ATECC608B secure element signing Ed25519 receipts)"
    example_fields:
      - "context.current_temperature_c"
      - "context.shock_g"
      - "context.gps_within_geofence"
      - "context.human_detected"
      - "context.interlock_state"
      - "context.permit_state"
      - "context.velocity_mps"
    resolution_source: sensor_attested
    notes: |
      Completes the day-1 set as the only dimension the digital-native
      entries don't cover. SINT's DynamicEnvelopePlugin evaluating
      `min(token.maxVelocityMps, obstacle_distance × reaction_factor)`
      per action is the cyber-physical analog of Cedar's
      `counterparty_account_age_days < 30` — both are context dimensions
      derived at evaluation time from sensor or signal input plus
      policy-level constraint.

      Per-evaluation resolution: for this dimension specifically, the
      resolution source varies by which sub-field is read. Temperature
      readings typically resolve as `sensor_attested`, geofence status
      typically as `gateway_derived` (GPS fix + policy-zone lookup),
      human_proximity varies by deployment. The `sensor_attested` value
      at the definition level records the most common path; producers
      should carry the actual per-field resolution_source on the
      evaluated value when it differs. Defining-contributor framing
      from @pshkv on #26.

# resolution_source enum (v0.1 — recommended, not required per pshkv feedback on #26):
#   gateway_derived      — gateway computes at request time (no persistence, no signing)
#   gateway_accumulated  — gateway accumulates over session lifetime
#   signal_composed      — derived from one or more signed signals at eval time
#   sensor_attested      — from signed sensor readings (physical contexts)
#   agent_reported       — agent self-reports (weakest trust mode, reserved for cases where no other resolution is available)
#
# v0.2 consideration: pshkv's alternative 4-value partition
# (agent | gateway | external_attestor | infrastructure) collapses
# gateway_derived + gateway_accumulated into `gateway`, splits
# `external_attestor` from `infrastructure` (TEE/secure-element), and
# treats `signal_composed` as derivative. If the v0.1 5-value partition
# surfaces ambiguities in production use, the 4-value alternative is
# the documented fallback for v0.2. Tracked on #26 for the v0.2 cycle.


# ─────────────────────────────────────────────────
# CROSSWALK MATCH SEMANTICS (per @QueBallSharken)
# Crosswalks MUST express partial match, not force clean mapping.
# ─────────────────────────────────────────────────
crosswalk_match_types:
  exact:
    definition: "Identical primitive, same signature semantics."
  structural:
    definition: "Same primitive shape, different field names."
  partial:
    definition: "Overlapping but not equivalent. Specify dimensions of divergence."
  non_equivalent_similar_label:
    definition: "Looks similar lexically but governance semantics differ. MUST be explicit."
  no_mapping:
    definition: "No analog in target system. Honest gap."

# ─────────────────────────────────────────────────
# DECISION TRAJECTORY (per @nanookclaw, contributed from PDR Section 8)
# Longitudinal primitives. These describe how decisions evolve over time
# rather than the verdict at any single moment. Different class of
# primitive than the point-in-time signal_types above: those answer
# "what is the verdict now?", these answer "how is the verdict moving?"
#
# Long-form rationale: docs/decision-trajectory.md
# Discussion: aeoess/agent-passport-system#13
# ─────────────────────────────────────────────────
decision_trajectory:
  decision_lineage:
    type: signal_type
    scheme: content_addressable_implementation_specific
    description: |
      Ordered content-addressable sequence of decisions affecting a single
      agent. Not the latest decision — the sequence. Each entry references
      its predecessor by content hash so the lineage can be replayed and
      verified end to end.
    descriptor_dimensions:
      enforcement_class: binding
      validity_temporal: sequence
    issuers_in_production: ["PDR", "APS"]
    notes: |
      v0.1 deliberately leaves the addressing scheme implementation-specific.
      May tighten in v0.2 if cross-system validation surfaces a need for a
      shared canonical hash format. See docs/decision-trajectory.md.
      APS implementation: `DecisionLineageReceipt` for the sequence envelope
      plus `computeProbeIdentity`/`verifyProbeIdentity` (SDK v1.41.0) for
      the per-entry content hash, using RFC 8785 JCS canonicalization and
      SHA-256 by default. Two probes with the same semantic content and
      different key order produce byte-identical hashes; array order is
      preserved as semantic.

  baseline_revision:
    type: annotation
    description: |
      Version identifier for the behavioral baseline the decision was
      evaluated against. Required so that two identical verdicts at
      different times are not silently semantically different — a `permit`
      against baseline v3 and a `permit` against baseline v4 can mean
      different things if the baseline tightened between the two.
    required_on:
      - behavioral_trust
      - divergence_signal
      - decision_lineage
    issuers_in_production: ["APS"]
    notes: |
      APS implementation: `scope_version_hash` — pre-commitment over the
      full scope state at issuance time, bound into the signed envelope.
      Consumers verify the scope hash matches the current scope revision
      before accepting a decision as fresh against the current baseline.

  divergence_signal:
    type: signal_type
    kind: quantitative_measurement
    description: |
      Quantitative behavioral deviation from a declared baseline_revision,
      as a first-class measurement distinct from any gate verdict it may
      trigger. The measurement and the gate are separable concerns: the
      same divergence value may permit on one consumer's policy and deny
      on another's.
    descriptor_dimensions:
      enforcement_class: advisory
      validity_temporal: windowed
    issuers_in_production: ["PDR", "APS"]
    notes: |
      APS implementation: `computeReputationDrift(rep, windowSize, opts?)`
      over a `recentObservations` ring buffer on `ScopedReputation` (SDK
      v1.41.0). Buffer capped at 30 events by default. Drift is the signed
      sum of effective muDeltas across the window, returned independently
      of any alert gate. Default thresholds 0.15 (warning) and 0.30
      (critical) align with NexusGuard AIP v0.5.48.

  trust_velocity:
    type: derived_signal
    description: |
      Rate of change in trust_score over a declared observation_window.
      Derivative, not snapshot. A high absolute trust_score with a steeply
      negative trust_velocity is a different governance situation than
      the same score with a positive velocity, and consumers should be
      able to express that distinction without recomputing it from raw
      history.
    requires:
      - observation_window
    issuers_in_production: ["PDR", "APS"]
    notes: |
      APS implementation: `computeReputationDrift` gives the directional
      change over the window (signed sum of muDeltas); `computeConsistencyScore`
      gives the dispersion (population stddev mapped to a (0, 1] score
      via 1 / (1 + stddev)). Both are shipped in SDK v1.41.0 and read from
      the same `recentObservations` ring buffer. Consumers that want only
      the rate-of-change signal use drift; consumers that want to distinguish
      "fast-moving but predictable" from "slow-moving but erratic" compose
      both. The §6.5 over-promiser robustness paradox (uniformly small
      negative deltas scoring higher on consistency than alternating large
      deltas, even when the alternating agent has a better mean) is locked
      as a regression test — predictability is orthogonal to performance.

# ─────────────────────────────────────────────────
# CONSTRAINTS
# Parameters that consumers and issuers must declare explicitly when
# producing certain signal types. Not signals themselves — required
# context that turns ambiguous signals into reproducible measurements.
# ─────────────────────────────────────────────────
constraints:
  observation_window:
    type: temporal_parameter
    description: |
      Temporal scope over which behavioral signals are collected. Must be
      declared explicitly by any consumer or issuer producing windowed
      signals (trust_velocity, divergence_signal). Without an explicit
      window declaration, two issuers reporting the same divergence value
      are not actually saying the same thing.

# ─────────────────────────────────────────────────
# OUT OF SCOPE FOR v0.1
# ─────────────────────────────────────────────────
out_of_scope:
  - "reputation_score (per @douglasborthwick-crypto: aggregating inside vocabulary leaks consumer policy into naming layer)"
  - "Free-form notes without structured semantics (per @MoltyCel: typed schemas only)"
  - "Renaming any live multi-attestation envelope `type` field (would break JWKS-verified payloads in production)"
